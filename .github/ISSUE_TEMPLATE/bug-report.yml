name: 问题反馈
description: 反馈教程、代码或环境问题
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 问题描述
      description: 说明在哪一节遇到问题，实际现象是什么。
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: 环境信息
      description: 硬件、系统、驱动、CANN、Python、PyTorch、torch_npu 等版本。
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 粘贴命令、配置和关键输出。
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 错误日志
      render: text
    validations:
      required: false

